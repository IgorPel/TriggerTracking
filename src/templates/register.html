<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Реєстрація</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f0f2f5; margin: 0; }
        .register-box { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 300px; }
        h2 { text-align: center; margin-bottom: 20px; color: #333; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; margin-top: 10px;}
        button:hover { background: #218838; }
        .link { text-align: center; margin-top: 15px; font-size: 14px; }
        .link a { color: #007bff; text-decoration: none; }
        .link a:hover { text-decoration: underline; }
        #error { color: red; text-align: center; margin-top: 10px; display: none; font-size: 14px;}
        #success { color: green; text-align: center; margin-top: 10px; display: none; font-size: 14px;}
    </style>
</head>
<body>
    <div class="register-box">
        <h2>Реєстрація</h2>
        <form id="registerForm">
            <input type="text" id="username" name="username" placeholder="Логін (Nickname)" required>
            <input type="email" id="email" name="email" placeholder="Email">
            <input type="password" id="password" name="password" placeholder="Пароль" required>
            <input type="password" id="confirm_password" placeholder="Підтвердіть пароль" required>
            <button type="submit">Створити акаунт</button>
        </form>

        <div id="error"></div>
        <div id="success">Акаунт створено! Переходимо на вхід...</div>

        <div class="link">
            Вже є акаунт? <a href="/login">Увійти</a>
        </div>
    </div>

    <script src="{{ url_for('static', path='/js/register.js') }}"></script>
</body>
</html>
